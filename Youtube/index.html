<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <button class="btn-icon"><i class="material-icons-outlined">menu</i></button>
            <div class="logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YouTube">
                <span>BR</span>
            </div>
        </div>

        <div class="nav-center">
            <div class="search-container">
                <div class="search-box">
                    <input type="text" placeholder="Pesquisar">
                    <button class="search-btn">
                        <i class="material-icons-outlined">search</i>
                    </button>
                </div>
                <button class="mic-btn">
                    <i class="material-icons-outlined">mic</i>
                </button>
            </div>
        </div>

        <div class="nav-right">
            <button class="btn-icon"><i class="material-icons-outlined">video_call</i></button>
            <button class="btn-icon"><i class="material-icons-outlined">notifications</i></button>
            <div class="user-auth">G</div>
        </div>
    </nav>

    <div class="container">
        <aside class="sidebar">
            <div class="menu-item active"><i class="material-icons-outlined">home</i><span>Início</span></div>
            <div class="menu-item"><i class="material-icons-outlined">bolt</i><span>Shorts</span></div>
            <div class="menu-item"><i class="material-icons-outlined">subscriptions</i><span>Inscrições</span></div>
            <hr>
            <div class="menu-item"><i class="material-icons-outlined">video_library</i><span>Você</span></div>
            <div class="menu-item"><i class="material-icons-outlined">history</i><span>Histórico</span></div>
        </aside>

        <main class="main-content">
            <div class="filters">
                <button class="chip active">Tudo</button>
                <button class="chip">Música</button>
                <button class="chip">Mixes</button>
                <button class="chip">Jogos</button>
                <button class="chip">Ao vivo</button>
                <button class="chip">Notícias</button>
            </div>

            <div class="video-grid" id="videoGrid">
                </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
